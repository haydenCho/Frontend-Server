<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 취업 지원 서비스</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
  </div>
</div>

<div class="container login-wrap">
  <h1 class="page-title">로그인</h1>
  <p class="page-desc">계정 정보를 입력하고 취업 지원 서비스를 이용해보세요.</p>

  <div class="card">
    <div class="field">
      <label for="inputEmail">이메일</label>
      <input type="email" id="inputEmail" placeholder="example@email.com">
    </div>
    <div class="field">
      <label for="inputPassword">비밀번호</label>
      <input type="password" id="inputPassword" placeholder="비밀번호 입력">
    </div>

    <button class="btn btn-primary btn-submit" id="loginBtn">로그인</button>
  </div>

  <div class="login-footer">
    아직 계정이 없으신가요? <a href="signUp.html">회원가입</a>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
