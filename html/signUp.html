<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 - 취업 지원 서비스</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/signUp.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
  </div>
</div>

<div class="container signup-wrap">
  <h1 class="page-title">회원가입</h1>
  <p class="page-desc">계정 정보와 희망 근무 조건을 입력하고 취업 지원 서비스를 시작해보세요.</p>

  <div class="section-title" style="margin-top:0;">계정 정보</div>
  <div class="card">
    <div class="field">
      <label for="inputEmail">이메일</label>
      <input type="email" id="inputEmail" placeholder="example@email.com">
    </div>
    <div class="field">
      <label for="inputPassword">비밀번호</label>
      <input type="password" id="inputPassword" placeholder="8자 이상 입력">
    </div>
    <div class="field">
      <label for="inputNickname">닉네임 (영문)</label>
      <input type="text" id="inputNickname" placeholder="영문/숫자/_ 2~20자">
    </div>
  </div>

  <div class="section-title">희망 근무 조건</div>
  <div class="card">
    <div class="group-label">희망 직무</div>
    <div class="field">
      <label for="jobPartInput">희망 직무 입력</label>
      <input type="text" id="jobPartInput" placeholder="예: 프론트엔드 개발자">
    </div>

    <div class="group-label">희망 지역</div>
    <div class="field">
      <label for="regionSelect">희망 지역 선택</label>
      <select id="regionSelect"></select>
    </div>

    <div class="row">
      <div class="field">
        <label for="careerSelect">경력조건</label>
        <select id="careerSelect"></select>
      </div>
      <div class="field">
        <label for="paySelect">희망 급여</label>
        <select id="paySelect"></select>
      </div>
    </div>
  </div>

  <button class="btn btn-primary btn-submit" id="signupBtn">회원가입</button>
</div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/signUp.js"></script>

</body>
</html>
