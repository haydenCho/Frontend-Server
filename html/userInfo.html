<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 - 취업 지원 서비스</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/userInfo.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
    <nav class="nav-links">
      <a href="jobPost.html">채용 공고</a>
      <a href="portfolio.html">포트폴리오</a>
      <a href="userInfo.html" class="active">마이페이지</a>
    </nav>
  </div>
</div>

<div class="container">
  <h1 class="page-title">마이페이지</h1>
  <p class="page-desc">계정 정보, 희망 조건, 포트폴리오를 관리할 수 있습니다.</p>

  <div class="card">
    <div class="profile-head">
      <div class="avatar" id="avatarInitial">?</div>
      <div>
        <div style="font-weight:700; font-size:16px;" id="userNickname"></div>
        <div class="profile-email" id="userEmail"></div>
      </div>
    </div>
    <div class="info-row"><span class="label">최근 관심 공고</span><span id="recentJobTitle">-</span></div>
  </div>

  <div class="section-title">희망 직무 / 지역</div>
  <div class="card">
    <p class="page-desc" style="margin-bottom:8px;">채용 공고 필터링에 사용됩니다.</p>
    <div class="field">
      <label for="jobPartInput">희망 직무</label>
      <input type="text" id="jobPartInput" placeholder="예: 프론트엔드 개발자">
    </div>
    <div class="field">
      <label for="regionSelect">희망 지역</label>
      <select id="regionSelect"></select>
    </div>
  </div>

  <div class="section-title">희망 근무 조건</div>
  <div class="card">
    <div class="row">
      <div class="field">
        <label for="careerSelect">경력조건</label>
        <select id="careerSelect"></select>
      </div>
      <div class="field">
        <label for="eduSelect">학력조건</label>
        <select id="eduSelect"></select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="empTypeSelect">고용형태</label>
        <select id="empTypeSelect"></select>
      </div>
      <div class="field">
        <label for="paySelect">희망 급여</label>
        <select id="paySelect"></select>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" id="savePrefsBtn">희망 조건 저장</button>
  </div>

  <div class="section-title">포트폴리오 관리</div>
  <div class="card">
    <div class="portfolio-summary">
      <div>
        <div class="label">등록된 포트폴리오</div>
        <div class="name" id="portfolioName">-</div>
      </div>
      <a class="btn btn-sm" href="portfolio.html">포트폴리오 관리 →</a>
    </div>
  </div>

  <div class="section-title">계정 관리</div>
  <div class="card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
    <div>
      <div style="font-weight:600; font-size:14px;">로그아웃</div>
      <div class="page-desc" style="margin:2px 0 0;">현재 계정에서 로그아웃합니다.</div>
    </div>
    <button class="btn" id="logoutBtn">로그아웃</button>
  </div>

  <div class="card danger-zone" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div style="font-weight:600; font-size:14px; color:var(--danger);">회원 탈퇴</div>
      <div class="page-desc" style="margin:2px 0 0;">탈퇴 시 모든 계정 정보와 포트폴리오가 삭제되며 복구할 수 없습니다.</div>
    </div>
    <button class="btn btn-danger" id="withdrawBtn">회원 탈퇴</button>
  </div>
</div>

<script src="js/mock-data.js"></script>
<script src="js/userInfo.js"></script>

</body>
</html>
