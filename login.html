<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 취업 지원 서비스</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-wrap {
    max-width: 400px;
    padding-top: 60px;
  }
  .login-wrap .page-title,
  .login-wrap .page-desc {
    text-align: center;
  }
  .login-wrap .page-desc { margin-bottom: 28px; }

  .btn-submit {
    width: 100%;
    justify-content: center;
    padding: 12px;
    font-size: 15px;
    margin-top: 4px;
  }

  .login-footer {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-sub);
  }
  .login-footer a {
    color: var(--primary);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
  </div>
</div>

<div class="container login-wrap">
  <h1 class="page-title">로그인</h1>
  <p class="page-desc">계정 정보를 입력하고 취업 지원 서비스를 이용해보세요.</p>

  <div class="card">
    <div class="field">
      <label>이메일</label>
      <input type="email" id="inputEmail" placeholder="example@email.com">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="inputPassword" placeholder="비밀번호 입력">
    </div>

    <button class="btn btn-primary btn-submit" id="loginBtn">로그인</button>
  </div>

  <div class="login-footer">
    아직 계정이 없으신가요? <a href="signUp.html">회원가입</a>
  </div>
</div>

<script src="mock-data.js"></script>
<script>
  function submitLogin() {
    const email = document.getElementById("inputEmail").value.trim();
    const password = document.getElementById("inputPassword").value;

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(email)) {
      showToast("올바른 이메일 형식을 입력해주세요.");
      return;
    }
    if (!password) {
      showToast("비밀번호를 입력해주세요.");
      return;
    }

    const account = loadMemberAccount();
    if (email !== account.email || password !== account.password) {
      showToast("이메일 또는 비밀번호가 일치하지 않습니다.");
      return;
    }

    showToast("로그인되었습니다.");
    setTimeout(() => {
      window.location.href = "userInfo.html";
    }, 900);
  }

  document.getElementById("loginBtn").addEventListener("click", submitLogin);
  document.getElementById("inputPassword").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitLogin();
  });
</script>

</body>
</html>
