<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 - 취업 지원 서비스</title>
<link rel="stylesheet" href="style.css">
<style>
  .signup-wrap { max-width: 560px; }

  .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .chip.selected {
    background: #eaf1ff;
    border-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
  }

  .group-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 8px;
  }

  .btn-submit {
    width: 100%;
    justify-content: center;
    padding: 12px;
    font-size: 15px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
  </div>
</div>

<div class="container signup-wrap">
  <h1 class="page-title">회원가입</h1>
  <p class="page-desc">계정 정보와 희망 근무 조건을 입력하고 취업 지원 서비스를 시작해보세요.</p>

  <div class="section-title" style="margin-top:0;">계정 정보</div>
  <div class="card">
    <div class="field">
      <label>이메일</label>
      <input type="email" id="inputEmail" placeholder="example@email.com">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="inputPassword" placeholder="8자 이상 입력">
    </div>
    <div class="field">
      <label>닉네임 (영문)</label>
      <input type="text" id="inputNickname" placeholder="영문/숫자/_ 2~20자">
    </div>
  </div>

  <div class="section-title">희망 근무 조건</div>
  <div class="card">
    <div class="group-label">희망 직무 (복수 선택 가능)</div>
    <div class="chip-list" id="jobPartList"></div>

    <div class="group-label">희망 지역 (복수 선택 가능)</div>
    <div class="chip-list" id="regionList"></div>

    <div class="row">
      <div class="field">
        <label>경력조건</label>
        <select id="careerSelect"></select>
      </div>
      <div class="field">
        <label>희망 급여</label>
        <select id="paySelect"></select>
      </div>
    </div>
  </div>

  <button class="btn btn-primary btn-submit" id="signupBtn">회원가입</button>
</div>

<script src="mock-data.js"></script>
<script>
  const jobPartList = document.getElementById("jobPartList");
  const regionList = document.getElementById("regionList");
  const selectedJobParts = new Set();
  const selectedRegions = new Set();

  function renderChips(container, options, selectedSet) {
    container.innerHTML = "";
    options.forEach((opt) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (selectedSet.has(opt) ? " selected" : "");
      chip.textContent = opt;
      chip.addEventListener("click", () => {
        if (selectedSet.has(opt)) selectedSet.delete(opt);
        else selectedSet.add(opt);
        renderChips(container, options, selectedSet);
      });
      container.appendChild(chip);
    });
  }
  renderChips(jobPartList, POSITIONS, selectedJobParts);
  renderChips(regionList, REGION_OPTIONS, selectedRegions);

  function fillSelect(selectEl, options) {
    selectEl.innerHTML = "";
    options.forEach((opt) => {
      const el = document.createElement("option");
      el.value = opt;
      el.textContent = opt;
      selectEl.appendChild(el);
    });
  }
  fillSelect(document.getElementById("careerSelect"), CAREER_OPTIONS);
  fillSelect(document.getElementById("paySelect"), PAY_OPTIONS);

  document.getElementById("signupBtn").addEventListener("click", () => {
    const email = document.getElementById("inputEmail").value.trim();
    const password = document.getElementById("inputPassword").value;
    const nickname = document.getElementById("inputNickname").value.trim();

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const nicknamePattern = /^[A-Za-z0-9_]{2,20}$/;

    if (!emailPattern.test(email)) {
      showToast("올바른 이메일 형식을 입력해주세요.");
      return;
    }
    if (password.length < 8) {
      showToast("비밀번호는 8자 이상 입력해주세요.");
      return;
    }
    if (!nicknamePattern.test(nickname)) {
      showToast("닉네임은 영문/숫자/_ 2~20자로 입력해주세요.");
      return;
    }
    if (selectedJobParts.size === 0) {
      showToast("희망 직무를 1개 이상 선택해주세요.");
      return;
    }
    if (selectedRegions.size === 0) {
      showToast("희망 지역을 1개 이상 선택해주세요.");
      return;
    }

    saveMemberAccount({ email, password, nickname });
    saveMemberPrefs({
      user_job_part: Array.from(selectedJobParts),
      user_region: Array.from(selectedRegions),
      user_personal_history: document.getElementById("careerSelect").value,
      user_pay: document.getElementById("paySelect").value,
    });

    showToast("회원가입이 완료되었습니다.");
    setTimeout(() => {
      window.location.href = "userInfo.html";
    }, 900);
  });
</script>

</body>
</html>
